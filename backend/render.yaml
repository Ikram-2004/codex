services:
  # ── Backend (FastAPI) ────────────────────────────────────────
  - type: web
    name: securepulse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # "sync: false" means you set it manually in the dashboard
      - key: GITHUB_TOKEN
        sync: false
      - key: ZAP_API_KEY
        sync: false
      - key: ZAP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: securepulse-db
          property: connectionString   # Render injects this automatically

  # ── Frontend (React/Vite) ────────────────────────────────────
  - type: web
    name: securepulse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

  # ── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: securepulse-db
    databaseName: securepulse
    user: securepulse